<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Blank
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-button class="button-ready" expand="full" (click)="firstButtonForTrained()">Añadir entrenamiento</ion-button>

  <div id="container">
    <strong>Ready to create an app?</strong>
  </div>

  <ion-card color="light">
    <ion-card-header>
      <ion-card-title>{{dayTrained.dayTrained}}</ion-card-title>
      <ion-card-subtitle>{{dayTrained.musclesTrained}}</ion-card-subtitle>
    </ion-card-header>
  
    <ion-card-content>
      Card Content
    </ion-card-content>
  </ion-card>


</ion-content>
